<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <section id="about" class="py-5">
      <div class="container">
        <div class="row g-5 align-items-center">
          <div class="col-md-5">
            <img
              src="https://via.placeholder.com/400x500"
              class="img-fluid rounded-3 shadow-sm"
              alt="About Me"
            />
          </div>
          <div class="col-md-7">
            <h2 class="fw-bold mb-4">About Me</h2>
            <p class="text-muted">
              I am a passionate developer with a focus on MERN stack. I love
              turning complex problems into simple, beautiful designs.
            </p>

            <div class="mt-4">
              <div class="mb-3">
                <div class="d-flex justify-content-between">
                  <span>Web Development</span><span>90%</span>
                </div>
                <div class="progress" style="height: 8px">
                  <div class="progress-bar bg-primary" style="width: 90%"></div>
                </div>
              </div>
              <div class="mb-3">
                <div class="d-flex justify-content-between">
                  <span>UI/UX Design</span><span>80%</span>
                </div>
                <div class="progress" style="height: 8px">
                  <div class="progress-bar bg-primary" style="width: 80%"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
